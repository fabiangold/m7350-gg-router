
# GG: Root auf GG-UI weiterleiten
url.redirect += ( "^/$" => "/gg/" )

# GG: TP-Link CGI-Endpunkte sperren (nur gg_* erlaubt)
# Blockiert Zugriff auf originale TP-Link Management-API via Webbrowser oder Tether-App.
$HTTP["url"] =~ "^/cgi-bin/" {
  $HTTP["url"] !~ "^/cgi-bin/gg_" {
    url.access-deny = ( "" )
  }
}
